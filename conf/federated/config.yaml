defaults:
  - _self_
  - dataset: mnist
  - method: fedavg
  - model: mlp

num_comm_rounds: 100
local_epochs: 1
seed: 42
device: cuda
use_wandb: false
wandb_project: "federated-learning-benchmark"

# Data partitioning parameters
num_clients: 10
alpha1: 1e6 # Dirichlet alpha for points per client
alpha2: 0.5 # Dirichlet alpha for classes per client
dataset_proportion: 1.0

# Method specific params (can be overridden in method configs)
rho: 0.1
mu: 0.01
temperature: 1.0

data_dir: "./data"
output_dir: "./outputs"
